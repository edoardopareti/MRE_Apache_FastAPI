version: '3.8'

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_network
    depends_on:
      - xampp-fastapi

  xampp-fastapi:
    build:
      context: ./xampp-fastapi
    container_name: xampp-fastapi
    networks:
      - app_network
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  app_network:
    driver: bridge
